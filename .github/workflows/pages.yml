name: deploy-pages

# Publishes the public/ folder to GitHub Pages.
# Triggers:
#  - push to main (manual content edits)
#  - by hand from the Actions tab
#  - automatically after the monthly-scan workflow finishes. This last one is
#    required because a workflow's own commit (the scan pushing rankings.json
#    with the built-in token) does NOT trigger the push event, so without the
#    workflow_run trigger the site would never refresh after a monthly scan.
on:
  push:
    branches: [main]
  workflow_dispatch: {}
  workflow_run:
    workflows: ["monthly-scan"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
