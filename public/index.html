<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vienna Restaurant Movement</title>
<style>
  :root{
    --ground:#F1F3EF; --panel:#FBFCFA; --ink:#15171B; --ink-soft:#5C6066;
    --line:#DDE0DA; --line-soft:#E9EBE6;
    --up:#2F7D5B; --hot:#B5701F; --flat:#9AA09A;
    --shadow:0 1px 0 var(--line), 0 1px 2px rgba(20,23,27,.04);
  }
  @media (prefers-color-scheme: dark){
    :root{ --ground:#15171A; --panel:#1C1F23; --ink:#ECEEEA; --ink-soft:#9AA0A2;
           --line:#2B2F33; --line-soft:#23262A; --up:#5FB58A; --hot:#D69A4E; --flat:#6B716E;
           --shadow:0 1px 0 #000, 0 1px 2px rgba(0,0,0,.3); }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--ground); color:var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px; margin:0 auto; padding:0 20px 80px}
  header{
    position:sticky; top:0; z-index:5; background:color-mix(in srgb, var(--ground) 88%, transparent);
    backdrop-filter:saturate(1.1) blur(8px);
    border-bottom:1px solid var(--line); padding:18px 20px; margin-bottom:8px;
  }
  .head-inner{max-width:920px; margin:0 auto; display:flex; align-items:baseline;
    justify-content:space-between; gap:16px; flex-wrap:wrap}
  .mark{font-weight:680; letter-spacing:-.02em; font-size:18px}
  .mark span{color:var(--up)}
  .meta{font-size:12.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums}
  .lede{max-width:60ch; color:var(--ink-soft); font-size:14px; margin:20px 0 28px}

  section{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); padding:20px 20px 8px; margin:18px 0;
  }
  .eyebrow{font-size:11.5px; letter-spacing:.09em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600}
  h2{font-size:21px; letter-spacing:-.02em; margin:6px 0 2px}
  .def{font-size:13px; color:var(--ink-soft); margin:0 0 14px}

  table{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums}
  th{font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--flat);
    font-weight:600; text-align:right; padding:6px 10px; border-bottom:1px solid var(--line)}
  th.l, td.l{text-align:left}
  td{padding:11px 10px; border-bottom:1px solid var(--line-soft); font-size:14.5px}
  tr:last-child td{border-bottom:none}
  .name{font-weight:560; letter-spacing:-.01em}
  .cuisine{color:var(--ink-soft); font-size:12.5px; text-transform:capitalize}
  .rating::before{content:"★ "; color:var(--hot)}
  .num{font-feature-settings:"tnum" 1}

  .mom{font-weight:600; white-space:nowrap}
  .mom.up{color:var(--up)} .mom.hot{color:var(--hot)} .mom.flat{color:var(--flat)}
  .mom .bar{display:inline-block; height:6px; border-radius:3px; vertical-align:middle;
    margin-left:8px; background:currentColor; opacity:.35}

  .empty{color:var(--ink-soft); font-size:13.5px; padding:6px 10px 16px; max-width:55ch}
  .empty b{color:var(--ink); font-weight:600}
  .rank{color:var(--flat); width:24px; font-size:12.5px}

  @media (max-width:620px){
    .hide-sm{display:none}
    td,th{padding-left:8px; padding-right:8px}
    h2{font-size:19px}
  }
</style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div class="mark">Vienna Restaurant <span>Movement</span></div>
      <div class="meta" id="meta">loading…</div>
    </div>
  </header>

  <div class="wrap">
    <p class="lede">Three reads on where Vienna's dining attention is going, rebuilt
      monthly from Google review counts. Thresholds are relative to the city each month,
      not fixed numbers — so the bar moves as the scene does.</p>

    <section id="blue"></section>
    <section id="rising"></section>
    <section id="breakout"></section>
  </div>

<script>
const SECTIONS = [
  { key:"blue_chips", el:"blue", eyebrow:"Established · top 15% on rating & reviews",
    title:"Blue Chips", def:"The reliably-loved institutions — high rated and heavily reviewed.",
    momentum:"abs" },
  { key:"rising_stars", el:"rising", eyebrow:"Momentum · quality + fastest review gain",
    title:"Rising Stars", def:"Already well-rated, and adding reviews faster than the rest.",
    momentum:"abs" },
  { key:"breakout", el:"breakout", eyebrow:"Early signal · 100–1,500 reviews, accelerating",
    title:"Breakouts", def:"Smaller rooms with the steepest month-over-month acceleration.",
    momentum:"rate", srcKey:"breakouts" },
];

const fmt = n => (n==null? "—" : n.toLocaleString("en-US"));
const pct = r => (r==null? "—" : (r*100).toFixed(1)+"%");

function momentumCell(row, mode, maxAbs, maxRate){
  if(mode==="rate"){
    const r = row.growth_rate;
    if(r==null) return `<span class="mom flat">—</span>`;
    const w = maxRate? Math.max(6, Math.round(60*r/maxRate)) : 0;
    return `<span class="mom hot">▲ ${pct(r)}<span class="bar" style="width:${w}px"></span></span>`;
  }
  const a = row.growth_abs;
  if(a==null) return `<span class="mom flat">—</span>`;
  const cls = a>0? "up" : "flat";
  const arrow = a>0? "▲" : (a<0? "▼" : "·");
  const w = (a>0 && maxAbs)? Math.max(6, Math.round(60*a/maxAbs)) : 0;
  return `<span class="mom ${cls}">${arrow} ${a>0?"+":""}${fmt(a)}<span class="bar" style="width:${w}px"></span></span>`;
}

function render(sec, rows, week){
  const node = document.getElementById(sec.el);
  const rateMode = sec.momentum==="rate";
  const maxAbs = Math.max(1, ...rows.map(r => r.growth_abs>0? r.growth_abs:0));
  const maxRate = Math.max(0.0001, ...rows.map(r => r.growth_rate>0? r.growth_rate:0));

  let head = `
    <div class="eyebrow">${sec.eyebrow}</div>
    <h2>${sec.title}</h2>
    <p class="def">${sec.def}</p>`;

  if(!rows.length){
    node.innerHTML = head + `<p class="empty"><b>Nothing here yet.</b> Momentum lists
      need two monthly snapshots before they mean anything. Blue Chips work from the
      first month; this list fills in once there's a previous month to compare${week?` (collecting since ${week})`:""}.</p>`;
    return;
  }

  const momHead = rateMode? "Accel." : "Δ reviews";
  const rowsHtml = rows.map((r,i)=>`
    <tr>
      <td class="l rank num">${i+1}</td>
      <td class="l"><span class="name">${r.name||"—"}</span>
        <div class="cuisine hide-sm">${(r.primary_type||"").replaceAll("_"," ")}</div></td>
      <td class="rating num hide-sm">${r.rating!=null? r.rating.toFixed(1):"—"}</td>
      <td class="num">${fmt(r.review_count)}</td>
      <td>${momentumCell(r, sec.momentum, maxAbs, maxRate)}</td>
    </tr>`).join("");

  node.innerHTML = head + `
    <table>
      <thead><tr>
        <th class="l rank"></th>
        <th class="l">Restaurant</th>
        <th class="hide-sm">Rating</th>
        <th>Reviews</th>
        <th>${momHead}</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

fetch("rankings.json", {cache:"no-store"})
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    const week = data.week_start_date;
    const gen = data.generated_at? new Date(data.generated_at).toLocaleString("en-GB",
      {day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
    const monthLabel = week? new Date(week).toLocaleString("en-GB",{month:"long",year:"numeric"}) : null;
    document.getElementById("meta").textContent =
      (monthLabel? `${monthLabel}` : "No data yet") + (gen? ` · built ${gen}`:"");
    SECTIONS.forEach(sec => render(sec, data[sec.srcKey||sec.key]||[], week));
  })
  .catch(err => {
    document.getElementById("meta").textContent = "rankings.json not found";
    document.getElementById("blue").innerHTML =
      `<p class="empty"><b>No data file yet.</b> Run the weekly scan and export once,
       then this page fills in. (fetch error: ${err.message})</p>`;
  });
</script>
</body>
</html>
